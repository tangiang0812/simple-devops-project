stages:
  - test
  - quality
  - image
  - deploy

variables:
  GO_VERSION: "1.25"
  IMAGE_URI: "$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$CI_PROJECT_NAME"

# ---------------------------
# TESTS + BENCHMARKS
# ---------------------------
test:
  stage: test
  image: golang:${GO_VERSION}
  script:
    - go test -v -bench=. -benchmem -cover ./...
  artifacts:
    when: always
    expire_in: 1 week

# ---------------------------
# LINT
# ---------------------------
lint:
  stage: quality
  image: golangci/golangci-lint:latest
  script:
    - golangci-lint run

# ---------------------------
# TRIVY FS SCAN (SOURCE)
# ---------------------------
trivy_fs_scan:
  stage: quality
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  script:
    - trivy fs --severity HIGH,CRITICAL --exit-code 1 .

# ---------------------------
# BUILD DOCKER IMAGE
# ---------------------------
build_image:
  stage: image
  image: docker:latest

  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t $IMAGE_URI:$CI_COMMIT_SHORT_SHA .
    - docker save $IMAGE_URI:$CI_COMMIT_SHORT_SHA -o image.tar
  artifacts:
    paths:
      - image.tar

# ---------------------------
# TRIVY IMAGE SCAN
# ---------------------------
trivy_image_scan:
  stage: image
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  needs: ["build_image"]
  before_script:
    - apk add --no-cache curl
    - curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
  script:
    - docker load -i image.tar
    - trivy image $IMAGE_URI:$CI_COMMIT_SHORT_SHA

# ---------------------------
# PUSH TO AWS ECR
# ---------------------------
push_ecr:
  stage: image
  image: docker:latest
  services:
    - name: docker:dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache python3 py3-pip curl
    - pip install --break-system-packages awscli
  script:
    - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
    - docker load -i image.tar
    - docker push $IMAGE_URI:$CI_COMMIT_SHORT_SHA
    - docker tag $IMAGE_URI:$CI_COMMIT_SHORT_SHA $IMAGE_URI:latest
    - docker push $IMAGE_URI:latest
  needs: ["build_image", "trivy_image_scan"]

# ---------------------------
# UPDATE K8S MANIFESTS
# ---------------------------
update_manifests:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache git
  script:
    - |
      rm -rf manifests-repo

      git clone --branch release https://gitlab-ci:$GITLAB_MANIFEST_PAT@$CI_SERVER_HOST/$CI_PROJECT_PATH-manifest manifests-repo

      sed -i "s|image: .*|image: ${IMAGE_URI}:$CI_COMMIT_SHORT_SHA |" \
        manifests-repo/deployment.yaml

      cd manifests-repo

      git config user.email "ci@example.com"
      git config user.name "GitLab CI"

      git add .
      git commit -m "Update image to ${CI_COMMIT_SHORT_SHA}" || echo "No changes"

      git push
